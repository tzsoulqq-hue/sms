syntax = "proto3";

package byte.v.forge.sms.providers.fivesim.v1;

import "google/protobuf/timestamp.proto";
import "byte/v/forge/contracts/sms/v1/sms.proto";
import "byte/v/forge/sms/internal/v1/sms_internal.proto";

option csharp_namespace = "ByteVForge.Sms.Providers.FiveSim.V1";
option go_package = "github.com/byte-v-forge/sms/gen/go/byte/v/forge/sms/providers/fivesim/v1;fivesimv1";
option java_multiple_files = true;
option java_outer_classname = "FiveSimProto";
option java_package = "com.bytevforge.sms.providers.fivesim.v1";
option php_namespace = "ByteVForge\\Sms\\Providers\\FiveSim\\V1";

enum FiveSimOrderStatus {
  FIVE_SIM_ORDER_STATUS_UNSPECIFIED = 0;
  FIVE_SIM_ORDER_STATUS_PENDING = 1;
  FIVE_SIM_ORDER_STATUS_RECEIVED = 2;
  FIVE_SIM_ORDER_STATUS_CANCELED = 3;
  FIVE_SIM_ORDER_STATUS_TIMEOUT = 4;
  FIVE_SIM_ORDER_STATUS_FINISHED = 5;
  FIVE_SIM_ORDER_STATUS_BANNED = 6;
}

message FiveSimProviderConfig {
  byte.v.forge.sms.internal.v1.SmsProviderConfig config = 1;
  string default_operator = 2;
  string ref = 3;
  string currency_code = 4;
  bool reuse = 5;
  bool voice = 6;
  bool forwarding = 7;
  string forwarding_number = 8;
}

message FiveSimBuyActivationRequest {
  string country = 1;
  string operator = 2;
  string product = 3;
  byte.v.forge.contracts.sms.v1.DecimalMoney max_price = 4;
  bool reuse = 5;
  bool voice = 6;
  bool forwarding = 7;
  string forwarding_number = 8;
  string ref = 9;
}

message FiveSimSms {
  int64 sms_id = 1;
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp sent_at = 3;
  string sender = 4;
  string text = 5;
  string code = 6;
}

message FiveSimOrder {
  int64 order_id = 1;
  google.protobuf.Timestamp created_at = 2;
  string phone_number = 3;
  string operator = 4;
  string product = 5;
  byte.v.forge.contracts.sms.v1.DecimalMoney price = 6;
  FiveSimOrderStatus status = 7;
  google.protobuf.Timestamp expires_at = 8;
  repeated FiveSimSms sms = 9;
  bool forwarding = 10;
  string forwarding_number = 11;
  string country = 12;
}

message FiveSimPriceOffer {
  byte.v.forge.sms.internal.v1.ProviderSmsPriceOffer offer = 1;
  string country = 2;
  string product = 3;
  string operator = 4;
  int32 count = 5;
  double success_rate = 6;
}
