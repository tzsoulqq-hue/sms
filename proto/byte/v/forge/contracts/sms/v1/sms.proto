syntax = "proto3";

package byte.v.forge.contracts.sms.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "ByteVForge.Contracts.Sms.V1";
option go_package = "github.com/byte-v-forge/sms/gen/go/byte/v/forge/contracts/sms/v1;smsv1";
option java_multiple_files = true;
option java_outer_classname = "SmsProto";
option java_package = "com.bytevforge.contracts.sms.v1";
option php_namespace = "ByteVForge\\Contracts\\Sms\\V1";

service SmsActivationService {
  rpc AcquireNumber(AcquireNumberRequest) returns (AcquireNumberResponse);
  rpc GetActivation(GetActivationRequest) returns (GetActivationResponse);
  rpc WaitForCode(WaitForCodeRequest) returns (WaitForCodeResponse);
  rpc MarkMessageSent(MarkMessageSentRequest) returns (MarkMessageSentResponse);
  rpc RequestAdditionalCode(RequestAdditionalCodeRequest) returns (RequestAdditionalCodeResponse);
  rpc CompleteActivation(CompleteActivationRequest) returns (CompleteActivationResponse);
  rpc CancelActivation(CancelActivationRequest) returns (CancelActivationResponse);
}

service SmsCatalogService {
  rpc ListSmsApplications(ListSmsApplicationsRequest) returns (ListSmsApplicationsResponse);
  rpc ListSmsCountries(ListSmsCountriesRequest) returns (ListSmsCountriesResponse);
  rpc ListSmsPriceOffers(ListSmsPriceOffersRequest) returns (ListSmsPriceOffersResponse);
  rpc ListTopSmsCountriesByApplication(ListTopSmsCountriesByApplicationRequest) returns (ListTopSmsCountriesByApplicationResponse);
}

enum SmsActivationStatus {
  SMS_ACTIVATION_STATUS_UNSPECIFIED = 0;
  SMS_ACTIVATION_STATUS_PENDING_CODE = 1;
  SMS_ACTIVATION_STATUS_MESSAGE_SENT = 2;
  SMS_ACTIVATION_STATUS_CODE_RECEIVED = 3;
  SMS_ACTIVATION_STATUS_ADDITIONAL_CODE_REQUESTED = 4;
  SMS_ACTIVATION_STATUS_COMPLETED = 5;
  SMS_ACTIVATION_STATUS_CANCELED = 6;
  SMS_ACTIVATION_STATUS_EXPIRED = 7;
  SMS_ACTIVATION_STATUS_FAILED = 8;
}

enum SmsErrorCode {
  SMS_ERROR_CODE_UNSPECIFIED = 0;
  SMS_ERROR_CODE_VALIDATION_FAILED = 1;
  SMS_ERROR_CODE_ROUTE_NOT_FOUND = 2;
  SMS_ERROR_CODE_ACTIVATION_NOT_FOUND = 3;
  SMS_ERROR_CODE_ACTIVATION_ALREADY_FINALIZED = 4;
  SMS_ERROR_CODE_NO_NUMBER_AVAILABLE = 5;
  SMS_ERROR_CODE_PRICE_LIMIT_EXCEEDED = 6;
  SMS_ERROR_CODE_RATE_LIMITED = 7;
  SMS_ERROR_CODE_SUPPLY_UNAVAILABLE = 8;
  SMS_ERROR_CODE_UPSTREAM_REJECTED = 9;
  SMS_ERROR_CODE_TIMEOUT = 10;
  SMS_ERROR_CODE_UNSUPPORTED_OPERATION = 11;
  SMS_ERROR_CODE_ACTIVATION_EXPIRED = 12;
  SMS_ERROR_CODE_CANCEL_NOT_ALLOWED = 13;
  SMS_ERROR_CODE_INSUFFICIENT_BALANCE = 14;
  SMS_ERROR_CODE_INTERNAL = 15;
}

message SmsError {
  SmsErrorCode code = 1;
  string message = 2;
  bool retryable = 3;
}

message DecimalMoney {
  // ISO 4217 currency code. Empty means the provider did not expose a currency.
  string currency_code = 1;
  // Decimal amount as text to avoid binary floating point drift.
  string amount_decimal = 2;
}

message PhoneNumber {
  // Full international number in E.164 form, for example "+15552220123".
  string e164_number = 1;
  // Subscriber/national part without country calling code when it is known.
  string national_number = 2;
  // ISO 3166-1 alpha-2 country code when normalized by routing metadata.
  string country_iso2 = 3;
  // Numeric country calling code without "+".
  string country_calling_code = 4;
}

message SmsTarget {
  // Provider-neutral target application key owned by Byte V Forge, not an upstream service code.
  string application_key = 1;
  // ISO 3166-1 alpha-2 country code.
  string country_iso2 = 2;
  // Numeric country calling code without "+".
  string country_calling_code = 3;
  DecimalMoney max_price = 4;
}

message SmsCode {
  string value = 1;
  google.protobuf.Timestamp received_at = 2;
}

message SmsActivation {
  string activation_id = 1;
  string request_id = 2;
  SmsTarget target = 3;
  PhoneNumber phone_number = 4;
  SmsActivationStatus status = 5;
  DecimalMoney price = 6;
  google.protobuf.Timestamp acquired_at = 7;
  google.protobuf.Timestamp expires_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  SmsError last_error = 10;
  bool can_request_additional_code = 11;
  // Earliest provider-allowed cancellation time. For SMSBower and HeroSMS this is normally acquired_at + 2 minutes.
  google.protobuf.Timestamp cancel_allowed_at = 12;
  map<string, string> labels = 20;
}

message AcquireNumberRequest {
  string request_id = 1;
  SmsTarget target = 2;
  google.protobuf.Duration lease_duration = 3;
  // Optional exact provider config to use. When set, routing does not auto-pick a provider.
  string provider_config_id = 4;
  // Optional provider key, for example "herosms" or "smsbower".
  string provider_key = 5;
  // Provider-neutral route profile key. When set, SMS resolves provider selection internally.
  string profile_key = 6;
  map<string, string> labels = 20;
}

message AcquireNumberResponse {
  SmsActivation activation = 1;
  SmsError error = 2;
}

message GetActivationRequest {
  string activation_id = 1;
}

message GetActivationResponse {
  SmsActivation activation = 1;
  SmsCode code = 2;
  SmsError error = 3;
}

message WaitForCodeRequest {
  string activation_id = 1;
  google.protobuf.Duration timeout = 2;
  google.protobuf.Duration poll_interval = 3;
}

message WaitForCodeResponse {
  SmsActivation activation = 1;
  SmsCode code = 2;
  SmsError error = 3;
}

message MarkMessageSentRequest {
  string activation_id = 1;
  string request_id = 2;
}

message RequestAdditionalCodeRequest {
  string activation_id = 1;
  string request_id = 2;
}

message CompleteActivationRequest {
  string activation_id = 1;
  string request_id = 2;
}

message CancelActivationRequest {
  string activation_id = 1;
  string request_id = 2;
  string reason = 3;
}

message MarkMessageSentResponse {
  SmsActivation activation = 1;
  SmsError error = 2;
}

message RequestAdditionalCodeResponse {
  SmsActivation activation = 1;
  SmsError error = 2;
}

message CompleteActivationResponse {
  SmsActivation activation = 1;
  SmsError error = 2;
}

message CancelActivationResponse {
  SmsActivation activation = 1;
  SmsError error = 2;
}

message SmsApplicationInfo {
  string application_key = 1;
  string display_name = 2;
  map<string, string> localized_names = 3;
}

message SmsCountry {
  string country_iso2 = 1;
  string name = 2;
  string country_calling_code = 3;
  map<string, string> localized_names = 4;
}

message SmsPriceOffer {
  string application_key = 1;
  string country_iso2 = 2;
  DecimalMoney price = 3;
  int32 available_count = 4;
}

message SmsCountryPriceSummary {
  SmsCountry country = 1;
  repeated SmsPriceOffer offers = 2;
}

message ListSmsApplicationsRequest {}

message ListSmsApplicationsResponse {
  repeated SmsApplicationInfo applications = 1;
  SmsError error = 2;
}

message ListSmsCountriesRequest {}

message ListSmsCountriesResponse {
  repeated SmsCountry countries = 1;
  SmsError error = 2;
}

message ListSmsPriceOffersRequest {
  string application_key = 1;
  string country_iso2 = 2;
}

message ListSmsPriceOffersResponse {
  repeated SmsPriceOffer offers = 1;
  SmsError error = 2;
}

message ListTopSmsCountriesByApplicationRequest {
  string application_key = 1;
  int32 limit = 2;
}

message ListTopSmsCountriesByApplicationResponse {
  repeated SmsCountryPriceSummary countries = 1;
  SmsError error = 2;
}

message SmsEventContext {
  string event_id = 1;
  string event_version = 2;
  google.protobuf.Timestamp occurred_at = 3;
  string source_service = 4;
  string correlation_id = 5;
  string trace_id = 6;
  string idempotency_key = 7;
}

message SmsActivationAcquiredEvent {
  SmsEventContext context = 1;
  SmsActivation activation = 2;
}

message SmsCodeReceivedEvent {
  SmsEventContext context = 1;
  string activation_id = 2;
  SmsCode code = 3;
}

message SmsActivationStatusChangedEvent {
  SmsEventContext context = 1;
  string activation_id = 2;
  SmsActivationStatus previous_status = 3;
  SmsActivationStatus current_status = 4;
  SmsError error = 5;
}
